  if (/hair/.test(label)) return "#222222";

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8e8e8);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0.8, 1.3, 3.2);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
renderer.domElement.addEventListener("contextmenu", e => e.preventDefault());
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.80, 0);
controls.enableDamping = true;

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const kl = new THREE.DirectionalLight(0xffffff, 2.5); kl.position.set(2,4,4); scene.add(kl);
const fl = new THREE.DirectionalLight(0xddeeff, 1.0); fl.position.set(-3,2,0); scene.add(fl);
const rl = new THREE.DirectionalLight(0xffeedd, 0.6); rl.position.set(0,2,-3); scene.add(rl);
const bl = new THREE.DirectionalLight(0xffffff, 0.4); bl.position.set(0,-1,2); scene.add(bl);

// ── Grid ──
{
  const g = new THREE.Group(), S = 4, D = 40, C = S/D;
  const mn = new THREE.LineBasicMaterial({color:0xcccccc});
  const mj = new THREE.LineBasicMaterial({color:0x999999});
  for (let i = 0; i <= D; i++) {
    const o = -S/2+i*C, m = (i%5===0)?mj:mn;
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-S/2,0,o),new THREE.Vector3(S/2,0,o)]),m));
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(o,0,-S/2),new THREE.Vector3(o,0,S/2)]),m));
  }
  const H = S/2;
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-H,.001,0),new THREE.Vector3(H,.001,0)]),new THREE.LineBasicMaterial({color:0xcc4444})));
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,.001,-H),new THREE.Vector3(0,.001,H)]),new THREE.LineBasicMaterial({color:0x4444cc})));
  const pl = new THREE.Mesh(new THREE.PlaneGeometry(S,S),new THREE.MeshBasicMaterial({color:0xdddddd,side:THREE.DoubleSide}));
  pl.rotation.x = -Math.PI/2; pl.position.y = -0.002; g.add(pl); scene.add(g);
}

// ── Build groups ──
const manAGroup = new THREE.Group(); manAGroup.name = "ManA";
const manBGroup = new THREE.Group(); manBGroup.name = "ManB";
const wM = new THREE.LineBasicMaterial({color:0x444444, transparent:true, opacity:0.15});

for (let i = 0; i < raw.length; i++) {
  const p = raw[i];
  let geo = null;

  if (p.geometryType === "cylinder") {
    geo = new THREE.CylinderGeometry(p.radiusTop, p.radiusBottom, p.height, 32);
  } else if (p.geometryType === "box") {
    geo = new THREE.BoxGeometry(p.width, p.height, p.depth);
  } else if (p.geometryType === "sphere") {
    geo = new THREE.SphereGeometry(p.radius, 24, 18);
  } else if (p.geometryType === "cone") {
    geo = new THREE.ConeGeometry(p.radius, p.height, p.radialSegments || 8);
  }

  if (!geo) continue;
  geo.computeVertexNormals();

  const col = resolveColor(p.label, p.color);
  const mat = new THREE.MeshStandardMaterial({color:col, roughness:0.65, metalness:0.05, side:THREE.FrontSide});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.name = p.label;

  if (p.scale) mesh.scale.set(p.scale.x, p.scale.y, p.scale.z);
  mesh.add(new THREE.LineSegments(new THREE.WireframeGeometry(geo), wM));
  mesh.position.set(p.position.x, p.position.y, p.position.z);
  mesh.rotation.set(p.rotation.x, p.rotation.y, p.rotation.z);

  if (p.label.startsWith("manA")) manAGroup.add(mesh);
  else manBGroup.add(mesh);
}

scene.add(manAGroup);
scene.add(manBGroup);
console.log("ManA:", manAGroup.children.length, "ManB:", manBGroup.children.length);

// ── Drag & Rotate ──
const rc = new THREE.Raycaster(), ms = new THREE.Vector2();
const dp = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
const hp = new THREE.Vector3(), dO = new THREE.Vector3();
let act = null, md = null, rsx = 0, rsy = 0;
const gs = [manAGroup, manBGroup];

function mOf(g) { const m=[]; g.traverse(c=>{if(c.isMesh)m.push(c)}); return m; }
function pk(e) {
  const r = renderer.domElement.getBoundingClientRect();
  ms.x = ((e.clientX-r.left)/r.width)*2-1;
  ms.y = -((e.clientY-r.top)/r.height)*2+1;
  rc.setFromCamera(ms, camera);
  for (const g of gs) if (rc.intersectObjects(mOf(g),false).length>0) return g;
  return null;
}

renderer.domElement.addEventListener("pointerdown", e => {
  const g = pk(e); if (!g) return;
  act = g; controls.enabled = false;
  if (e.button === 2) {
    md = "rotate"; rsx = e.clientX; rsy = g.rotation.y;
    renderer.domElement.style.cursor = "ew-resize";
  } else {
    md = "drag"; rc.ray.intersectPlane(dp,hp); dO.copy(g.position).sub(hp);
    renderer.domElement.style.cursor = "grabbing";
  }
});

renderer.domElement.addEventListener("pointermove", e => {
  if (!act) { renderer.domElement.style.cursor = pk(e)?"grab":"default"; return; }
  const r = renderer.domElement.getBoundingClientRect();
  ms.x = ((e.clientX-r.left)/r.width)*2-1;
  ms.y = -((e.clientY-r.top)/r.height)*2+1;
  rc.setFromCamera(ms, camera);
  if (md === "drag") {
    if (rc.ray.intersectPlane(dp,hp)) { act.position.x=hp.x+dO.x; act.position.z=hp.z+dO.z; }
  } else {
    act.rotation.y = rsy + (e.clientX-rsx)*0.01;
  }
});

renderer.domElement.addEventListener("pointerup", () => {
  if (act) { act=null; md=null; controls.enabled=true; renderer.domElement.style.cursor="default"; }
});
renderer.domElement.addEventListener("pointerleave", () => {
  if (act) { act=null; md=null; controls.enabled=true; }
  renderer.domElement.style.cursor = "default";
});

// ── Animate ──
(function a() { requestAnimationFrame(a); controls.update(); renderer.render(scene,camera); })();
addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
