// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0.25, 0.25, 0.40);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
renderer.domElement.addEventListener("contextmenu", e => e.preventDefault());
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.06, 0);
controls.enableDamping = true;

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const kl=new THREE.DirectionalLight(0xffffff,2.0); kl.position.set(1,3,2); scene.add(kl);
const fl=new THREE.DirectionalLight(0xddeeff,0.8); fl.position.set(-2,1.5,0); scene.add(fl);
const rl=new THREE.DirectionalLight(0xffeedd,0.4); rl.position.set(0,1,-2); scene.add(rl);
const bl=new THREE.DirectionalLight(0xffffff,0.3); bl.position.set(0,-1,1); scene.add(bl);

// ── Grid ──
{
  const g=new THREE.Group(), S=1.0, D=20, C=S/D;
  const mn=new THREE.LineBasicMaterial({color:0xcccccc}), mj=new THREE.LineBasicMaterial({color:0x999999});
  for(let i=0;i<=D;i++){const o=-S/2+i*C,m=(i%5===0)?mj:mn;
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-S/2,0,o),new THREE.Vector3(S/2,0,o)]),m));
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(o,0,-S/2),new THREE.Vector3(o,0,S/2)]),m));
  }
  const H=S/2;
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-H,.0005,0),new THREE.Vector3(H,.0005,0)]),new THREE.LineBasicMaterial({color:0xcc4444})));
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,.0005,-H),new THREE.Vector3(0,.0005,H)]),new THREE.LineBasicMaterial({color:0x4444cc})));
  const pl=new THREE.Mesh(new THREE.PlaneGeometry(S,S),new THREE.MeshBasicMaterial({color:0xe0e0e0,side:THREE.DoubleSide}));
  pl.rotation.x=-Math.PI/2; pl.position.y=-0.001; g.add(pl); scene.add(g);
}

// ── Build THREE.Groups from logical grouping ──
const threeGroups = {}; // key -> THREE.Group
const meshToGroupKey = new Map(); // mesh -> group key
const allMeshes = [];
const wM = new THREE.LineBasicMaterial({color:0x333333, transparent:true, opacity:0.12});

// Create THREE.Group for each logical group
for (const [key, def] of Object.entries(groupDefs)) {
  const grp = new THREE.Group();
  grp.name = def.name;
  grp.userData.groupKey = key;
  threeGroups[key] = grp;
  scene.add(grp);
}

// Build meshes and assign to groups
for (let i = 0; i < raw.length; i++) {
  const p = raw[i];
  let geo = null;
  let isTube = false;

  if (p.geometryType === "cylinder") {
    geo = new THREE.CylinderGeometry(p.radiusTop, p.radiusBottom, p.height, 32);
  } else if (p.geometryType === "box") {
    geo = new THREE.BoxGeometry(p.width, p.height, p.depth);
  } else if (p.geometryType === "sphere") {
    geo = new THREE.SphereGeometry(p.radius, 24, 18);
  } else if (p.geometryType === "cone") {
    geo = new THREE.ConeGeometry(p.radius, p.height, p.radialSegments || 8);
  } else if (p.geometryType === "lathe") {
    const pts = p.profilePoints.map(pt => new THREE.Vector2(pt.x, pt.y));
    geo = new THREE.LatheGeometry(pts, p.segments || 32);
  } else if (p.geometryType === "torus") {
    geo = new THREE.TorusGeometry(p.radius, p.tubeRadius, 16, 48);
  } else if (p.geometryType === "tube") {
    isTube = true;
    const pts = p.tubePoints.map(pt => new THREE.Vector3(pt.x, pt.y, pt.z));
    const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
    geo = new THREE.TubeGeometry(curve, Math.max(16, pts.length*16), p.tubeRadius, 8, false);
  } else if (p.geometryType === "extrude") {
    const shape = new THREE.Shape();
    for (const cmd of p.pathCommands) {
      if (cmd.op==="M") shape.moveTo(cmd.x, cmd.y);
      else if (cmd.op==="L") shape.lineTo(cmd.x, cmd.y);
      else if (cmd.op==="Q") shape.quadraticCurveTo(cmd.cp1x, cmd.cp1y, cmd.x, cmd.y);
      else if (cmd.op==="C") shape.bezierCurveTo(cmd.cp1x, cmd.cp1y, cmd.cp2x, cmd.cp2y, cmd.x, cmd.y);
    }
    geo = new THREE.ExtrudeGeometry(shape, {depth:p.depth, bevelEnabled:p.bevelEnabled||false});
    geo.translate(0, 0, -p.depth/2);
  }

  if (!geo) continue;
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color: p.color, roughness: 0.65, metalness: 0.05,
    side: THREE.DoubleSide, transparent: true, opacity: 0.9, depthWrite: true
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.name = p.label;
  if (p.scale) mesh.scale.set(p.scale.x, p.scale.y, p.scale.z);
  mesh.add(new THREE.LineSegments(new THREE.WireframeGeometry(geo), wM));

  if (!isTube) {
    mesh.position.set(p.position.x, p.position.y, p.position.z);
    mesh.rotation.set(p.rotation.x, p.rotation.y, p.rotation.z);
  }

  const gKey = getGroupKey(p.label);
  if (gKey && threeGroups[gKey]) {
    threeGroups[gKey].add(mesh);
    meshToGroupKey.set(mesh, gKey);
  } else {
    scene.add(mesh);
  }
  allMeshes.push(mesh);
}

// ── Selection & Interaction ──
const infoEl = document.getElementById('info');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const hitPoint = new THREE.Vector3();
const dragOffset = new THREE.Vector3();

let activeGroup = null;
let mode = null;
let rotStartX = 0;
let rotStartY = 0;
let hoveredKey = null;

// Highlight colors
const defaultOpacity = 0.9;
const hoverOpacity = 1.0;

function setGroupHighlight(key, highlight) {
  const grp = threeGroups[key];
  if (!grp) return;
  grp.traverse(child => {
    if (child.isMesh && child.material) {
      child.material.opacity = highlight ? hoverOpacity : defaultOpacity;
      child.material.emissive = highlight ? new THREE.Color(0x224466) : new THREE.Color(0x000000);
      child.material.emissiveIntensity = highlight ? 0.3 : 0;
    }
  });
}

function pickGroup(e) {
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes, false);
  if (hits.length > 0) {
    const mesh = hits[0].object;
    const key = meshToGroupKey.get(mesh);
    if (key) return { key, group: threeGroups[key] };
  }
  return null;
}

renderer.domElement.addEventListener("pointerdown", e => {
  const hit = pickGroup(e);
  if (!hit) return;

  activeGroup = hit.group;
  controls.enabled = false;
  setGroupHighlight(hit.key, true);
  infoEl.textContent = `Moving: ${hit.group.name}`;

  if (e.button === 2) {
    mode = "rotate";
    rotStartX = e.clientX;
    rotStartY = activeGroup.rotation.y;
    renderer.domElement.style.cursor = "ew-resize";
  } else {
    mode = "drag";
    raycaster.ray.intersectPlane(dragPlane, hitPoint);
    dragOffset.copy(activeGroup.position).sub(hitPoint);
    renderer.domElement.style.cursor = "grabbing";
  }
});

renderer.domElement.addEventListener("pointermove", e => {
  if (!activeGroup) {
    // Hover highlight
    const hit = pickGroup(e);
    const newKey = hit ? hit.key : null;
    if (newKey !== hoveredKey) {
      if (hoveredKey) setGroupHighlight(hoveredKey, false);
      hoveredKey = newKey;
      if (hoveredKey) {
        setGroupHighlight(hoveredKey, true);
        infoEl.textContent = `Hover: ${threeGroups[hoveredKey].name}`;
      } else {
        infoEl.textContent = "Click a food item to move its group";
      }
    }
    renderer.domElement.style.cursor = hit ? "grab" : "default";
    return;
  }

  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (mode === "drag") {
    if (raycaster.ray.intersectPlane(dragPlane, hitPoint)) {
      activeGroup.position.x = hitPoint.x + dragOffset.x;
      activeGroup.position.z = hitPoint.z + dragOffset.z;
    }
  } else if (mode === "rotate") {
    activeGroup.rotation.y = rotStartY + (e.clientX - rotStartX) * 0.01;
  }
});

renderer.domElement.addEventListener("pointerup", () => {
  if (activeGroup) {
    // Find the key for unhighlighting
    for (const [key, grp] of Object.entries(threeGroups)) {
      if (grp === activeGroup) { setGroupHighlight(key, false); break; }
    }
    activeGroup = null;
    mode = null;
    controls.enabled = true;
    renderer.domElement.style.cursor = "default";
    infoEl.textContent = "Click a food item to move its group";
  }
});

renderer.domElement.addEventListener("pointerleave", () => {
  if (activeGroup) {
    for (const [key, grp] of Object.entries(threeGroups)) {
      if (grp === activeGroup) { setGroupHighlight(key, false); break; }
    }
    activeGroup = null;
    mode = null;
    controls.enabled = true;
  }
  if (hoveredKey) { setGroupHighlight(hoveredKey, false); hoveredKey = null; }
  renderer.domElement.style.cursor = "default";
  infoEl.textContent = "Click a food item to move its group";
});

// ── Animate ──
(function a() {
  requestAnimationFrame(a);
  controls.update();
  renderer.render(scene, camera);
})();

addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
