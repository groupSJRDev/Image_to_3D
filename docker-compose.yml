services:
  backend:
    build: .
    ports:
      - "8010:8010"
    env_file: .env
    volumes:
      - ./renderer.db:/app/renderer.db
      - ./examples:/app/examples
    command: uvicorn renderer.server:app --host 0.0.0.0 --port 8010

  frontend:
    build: ./frontend
    ports:
      - "3010:3010"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8010
